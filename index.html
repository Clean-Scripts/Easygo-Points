<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>EasyGo VIP</title>
    <link rel="icon" href="EasyGo-Logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body{margin:0;font-family:system-ui;color:white;min-height:100vh;background:url('background.png') no-repeat center/cover fixed}
        .card{background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);padding:20px;border-radius:26px;box-shadow:0 10px 30px rgba(0,0,0,0.5);animation:fadeUp .5s}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .popup{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#111;padding:14px 20px;border-radius:12px;display:none;z-index:9999;font-weight:bold;border-left:4px solid #f97316}
        .show{display:block}
        button{font-weight:bold;transition:.3s;border-radius:50px;text-transform:uppercase;letter-spacing:.5px}
        button:active{transform:scale(0.96)}
        .progress-bar{height:6px;background:#222;border-radius:10px;overflow:hidden;margin:10px 0}
        .progress{height:100%;background:linear-gradient(90deg,#facc15,#f97316);width:0;transition:1.2s linear}
        input,select{outline:none}
    </style>
</head>
<body class="flex flex-col items-center">

<div id="popup" class="popup"></div>

<div id="welcomeBanner" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] hidden">
    <div class="bg-white text-black p-6 rounded-3xl max-w-sm text-center shadow-2xl">
        <h2 class="text-2xl font-bold mb-2 text-orange-600">🔥 VIP Launch Offer</h2>
        <p class="text-sm mb-4">🎁 First Claim par <b>30 Bonus Coins</b> 🪙</p>
        <button onclick="closeWelcome()" class="bg-orange-500 text-white px-8 py-2 rounded-full w-full">Awesome 🔥</button>
    </div>
</div>

<div class="w-full max-w-[420px] p-5">
    <div class="text-center mb-6">
        <img src="EasyGo-Logo.png" class="h-16 mx-auto">
        <h1 class="text-3xl font-bold mt-2 text-yellow-400">EasyGo VIP</h1>
    </div>

    <div id="login" class="card">
        <h2 class="text-xl mb-4 text-center font-bold">Login</h2>
        <input id="mobile" type="tel" placeholder="Mobile Number" class="w-full p-4 text-black rounded-2xl mb-4 font-bold text-center">
        <button onclick="sendOTP()" class="w-full bg-orange-500 py-4 text-white shadow-lg">Send OTP</button>
    </div>

    <div id="otpBox" class="card hidden">
        <h2 class="text-xl mb-2 text-center font-bold">Verifying OTP</h2>
        <p class="text-center text-xs text-gray-400 mb-2">Auto-reading...</p>
        <input id="otp" type="number" placeholder="----" class="w-full p-4 text-black rounded-2xl mb-2 text-center text-2xl font-bold tracking-widest">
        <div class="progress-bar"><div id="otpLoader" class="progress"></div></div>
    </div>

    <div id="app" class="hidden space-y-4">
        <nav class="flex justify-between gap-2 bg-black/30 p-2 rounded-full">
            <button class="bg-orange-500 text-white flex-1 py-2" onclick="showTab('claim')">Claim</button>
            <button class="bg-yellow-500 text-black flex-1 py-2" onclick="showTab('wallet')">Wallet</button>
            <button class="bg-purple-600 text-white flex-1 py-2" onclick="showTab('leaderboard')">Board</button>
        </nav>

        <div id="claim" class="tab-content card">
            <h2 class="text-xl font-bold mb-3">Claim Reward</h2>
            <input id="code" placeholder="Enter code here..." class="w-full p-4 text-black rounded-2xl bg-white mb-4 uppercase">
            <button onclick="claimCode()" class="w-full bg-orange-500 py-4 shadow-lg text-white">Claim Reward</button>
        </div>

        <div id="wallet" class="tab-content card hidden text-center">
            <h2 class="text-lg mb-1">Your Coins</h2>
            <div class="text-5xl text-yellow-400 font-bold mb-4" id="coins">0</div>
            <h3 class="text-md mb-2 text-left font-semibold">Redeem Coins</h3>
            <select id="redeemItem" class="w-full p-4 text-black rounded-xl mb-4 font-bold">
                <option value="90">[2 Pcs] Crispy Mini Samosas 🥟 — 90 Coins</option>
                <option value="100">[2 Pcs] Crunchy Cheese Balls 🧀 — 100 Coins</option>
                <option value="150">[70 G] French Fries 🍟 — 150 Coins</option>
                <option value="200">[2 Pcs] Cheese Corn Nuggets 🌽 — 200 Coins</option>
                <option value="250">[5 Pcs] Veg Momos 🥟 — 250 Coins</option>
                <option value="300">[4 Pcs] Spring Roll 🥢 — 300 Coins</option>
                <option value="350">[5 Pcs] Premium Paneer Momos 🧀 — 350 Coins</option>
                <option value="400">Full Plate Veg Momos 🍜 — 400 Coins</option>
                <option value="450">Full Plate Cheese Corn Nuggets 🌽 — 450 Coins</option>
                <option value="500">VIP 👑 Combo — [7 Pcs] Cheese Corn Momos 🥟 + Fries 🍟 — 500 Coins</option>
            </select>
            <button onclick="redeemCoins()" class="w-full bg-green-500 py-4 text-white">Redeem Now 🪙</button>
        </div>

        <div id="leaderboard" class="tab-content card hidden">
            <h2 class="text-xl font-bold mb-4 text-center">Top Foodies 🏆</h2>
            <div id="board" class="space-y-2"></div>
        </div>
    </div>
</div>

<script>
    const API="https://script.google.com/macros/s/AKfycbx-wK_hJpZBNN6S2IGRHDzwvB9U50Z7Flit1e74MK_qd1-kULZnt33PK9tBlC6Dl4Td/exec";
    let mobile, generatedOTP;

    function popup(msg){
        const p=document.getElementById("popup");
        p.innerText=msg; p.classList.add("show");
        setTimeout(()=>p.classList.remove("show"),3000);
    }

    function showTab(id){
        document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    async function api(data){
        let res=await fetch(API,{method:"POST",body:JSON.stringify(data)});
        return await res.json();
    }

    function sendOTP(){
        mobile=document.getElementById("mobile").value;
        if(mobile.length!=10){ popup("Enter 10 digit mobile"); return; }
        generatedOTP=Math.floor(1000+Math.random()*9000);
        popup("OTP Sent: "+generatedOTP);
        document.getElementById("login").classList.add("hidden");
        document.getElementById("otpBox").classList.remove("hidden");
        
        // Auto-fill and Auto-login
        setTimeout(()=>{
            document.getElementById("otp").value=generatedOTP;
            document.getElementById("otpLoader").style.width="100%";
            setTimeout(verifyOTP, 1300);
        }, 1000);
    }

    async function verifyOTP(){
        if(document.getElementById("otp").value==generatedOTP){
            let res=await api({action:"login",mobile});
            if(res.success){
                localStorage.setItem("easygo_user",mobile);
                startApp();
                document.getElementById("welcomeBanner").classList.remove("hidden");
                confetti({particleCount:100, spread:70, origin:{y:0.6}});
            }
        }
    }

    function startApp(){
        document.getElementById("otpBox").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        loadWallet(); loadLeaderboard();
    }

    async function loadWallet(){
        let res=await api({action:"wallet",mobile});
        document.getElementById("coins").innerText=res.coins;
    }

    async function redeemCoins(){
        let item=document.getElementById("redeemItem");
        let cost=item.value;
        let text=item.options[item.selectedIndex].text;
        if(!confirm("Redeem "+text+"?")) return;
        let res=await api({action:"redeem",mobile,cost});
        if(res.success){
            window.open(`https://wa.me/917651837322?text=${encodeURIComponent('Redeemed: '+text+' (User: '+mobile+')')}`);
            popup("Request Sent!");
            loadWallet();
        }
    }

    async function loadLeaderboard(){
        let res=await api({action:"leaderboard"});
        let board=document.getElementById("board");
        board.innerHTML=res.map((u,i)=>`
            <div class="flex justify-between border-b border-white/10 py-2 text-sm">
                <span>${i+1}. XX${String(u.mobile).slice(-4)}</span>
                <span class="font-bold text-yellow-400">${u.coins} Coins</span>
            </div>
        `).join('');
    }

    function closeWelcome(){document.getElementById("welcomeBanner").classList.add("hidden")}
</script>
</body>
</html>
