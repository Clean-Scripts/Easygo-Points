<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyGo VIP</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="icon" href="EasyGo-Logo.png" />
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzLcPIGwU4FqAkA3sGNCxFrcn9M8KmcPZ5aNEH01oWVCVdQy8DNY6SyszxqACdkVc0_/exec";

let currentMobile = null;

async function api(data){

 const res = await fetch(API_URL,{
  method:"POST",
  body:JSON.stringify(data)
 });

 return await res.json();

}

async function login(){

 const mobile = document.getElementById("mobile").value;

 if(mobile.length!=10){
 alert("Enter valid mobile");
 return;
 }

 currentMobile = mobile;

 const res = await api({
 action:"login",
 mobile
 });

 document.getElementById("login").classList.add("hidden");
 document.getElementById("app").classList.remove("hidden");

 loadWallet();
 loadLeaderboard();

}

async function claim(){

 const code = document.getElementById("code").value;

 const res = await api({
 action:"claim",
 mobile:currentMobile,
 code
 });

 if(res.error){
 alert(res.error);
 return;
 }

 alert("Coins added: "+res.coins);

 loadWallet();

}

async function loadWallet(){

 const res = await api({
 action:"wallet",
 mobile:currentMobile
 });

 document.getElementById("coins").innerText = res.coins;

}

async function loadLeaderboard(){

 const res = await api({
 action:"leaderboard"
 });

 const board = document.getElementById("leaderboard");
 board.innerHTML="";

 res.forEach((u,i)=>{

 const div=document.createElement("div");

 div.className="flex justify-between bg-white p-3 rounded-xl shadow";

 div.innerHTML=`
 <span>#${i+1} ${u[0]}</span>
 <span>${u[1]} coins</span>
 `;

 board.appendChild(div);

 });

}

</script>

</head>

<body class="bg-orange-50 min-h-screen flex items-center justify-center">

<div class="max-w-md w-full">

<div id="login" class="bg-white p-6 rounded-2xl shadow-xl">

<div class="text-center mb-6">
<img src="EasyGo-Logo.png" class="h-16 mx-auto">
<h1 class="text-2xl font-bold mt-3">EasyGo VIP</h1>
</div>

<input id="mobile" placeholder="Enter mobile" class="w-full border p-3 rounded-xl">

<button onclick="login()" class="mt-4 w-full bg-orange-500 text-white p-3 rounded-xl">
Login
</button>

</div>

<div id="app" class="hidden space-y-6">

<div class="bg-white p-6 rounded-2xl shadow-xl text-center">
<h2 class="text-xl font-bold">Wallet</h2>

<div class="text-4xl text-orange-500 mt-3" id="coins">0</div>

<p class="text-gray-500">Coins</p>
</div>

<div class="bg-white p-6 rounded-2xl shadow-xl">

<h2 class="font-bold mb-3">Enter Code</h2>

<div class="flex gap-2">

<input id="code" class="flex-1 border p-3 rounded-xl" placeholder="Enter code">

<button onclick="claim()" class="bg-orange-500 text-white px-5 rounded-xl">
Claim
</button>

</div>

</div>

<div class="bg-white p-6 rounded-2xl shadow-xl">

<h2 class="font-bold mb-4">Leaderboard</h2>

<div id="leaderboard" class="space-y-2"></div>

</div>

<a href="https://clean-scripts.github.io/Easygo-Menu/" class="block text-center bg-red-600 text-white p-4 rounded-xl font-bold">
Place Order Now
</a>

</div>

</div>

</body>
</html>
