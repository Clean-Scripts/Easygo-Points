<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EasyGo VIP</title>
<link rel="icon" href="EasyGo-Logo.png" type="image/png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
/* ------------------ GENERAL ------------------ */
body{
  margin:0;
  font-family:system-ui;
  color:white;
  height:100vh;
  background:url('background.png') no-repeat center/cover;
}
.app{max-width:420px;margin:auto;padding:20px;}

/* ------------------ CARD ------------------ */
.card{
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  animation:fadeUp .5s;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ------------------ POPUP ------------------ */
.popup{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:14px 20px;
  border-radius:8px;
  display:none;
  z-index:9999;
  font-weight:bold;
  text-align:center;
}
.show{display:block;}

/* ------------------ BUTTONS ------------------ */
button{
  font-weight:bold;
  transition:0.3s;
  cursor:pointer;
  border:none;
  border-radius:12px;
}
button:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px #f97316,0 0 20px #facc15;
}

/* ------------------ NEON HEADERS ------------------ */
h1,h2,h3{
  text-shadow:0 0 5px #f97316,0 0 10px #facc15;
}

/* ------------------ COIN FLY ------------------ */
.coin-fly{
  position:absolute;
  width:24px;
  height:24px;
  background:url('coin.png') no-repeat center/cover;
  pointer-events:none;
  z-index:9999;
}

/* ------------------ MILESTONE ------------------ */
.progress-bar{height:20px;background:#222;border-radius:10px;overflow:hidden;margin:10px 0;}
.progress{height:100%;background:linear-gradient(90deg,#facc15,#f97316);width:0;transition:0.5s;}
.milestone-badge{display:inline-block;margin:2px;padding:4px 8px;border-radius:8px;background:#222;color:#fff;transition:0.3s;}
.milestone-badge.reached{
  background:yellow;color:black;font-weight:bold;
  transform:scale(1.2);
  animation:badgeGlow 1s infinite alternate;
}
@keyframes badgeGlow{0%{box-shadow:0 0 5px yellow;}100%{box-shadow:0 0 20px gold;}}

/* ------------------ LEADERBOARD ------------------ */
#board div:hover{background:rgba(255,255,255,0.1);border-radius:8px;transition:0.3s;}
.medal{font-size:20px;transition:0.3s;}
.medal.animated{transform:scale(1.5);color:#facc15;transition:0.5s;}
</style>
</head>
<body>

<div id="popup" class="popup"></div>

<div class="app">
<div class="text-center mb-6">
<img src="EasyGo-Logo.png" class="h-16 mx-auto">
<h1 class="text-3xl font-bold mt-2">EasyGo VIP Rewards</h1>
</div>

<!-- LOGIN -->
<div id="login" class="card">
<h2 class="text-xl mb-4">Login</h2>
<input id="mobile" placeholder="Enter Mobile Number" class="w-full p-3 text-black rounded mb-3">
<button onclick="sendOTP()" class="w-full bg-orange-500 p-3 rounded">Send OTP</button>
</div>

<!-- OTP -->
<div id="otpBox" class="card hidden">
<h2 class="text-xl mb-4">Enter OTP</h2>
<input id="otp" placeholder="Enter OTP" class="w-full p-3 text-black rounded mb-3">
<button onclick="verifyOTP()" class="w-full bg-green-500 p-3 rounded">Verify OTP</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
<nav class="flex gap-2 mb-4">
<button class="bg-orange-500" onclick="showTab('claim')">Claim Code</button>
<button class="bg-yellow-500" onclick="showTab('wallet')">Wallet</button>
<button class="bg-purple-600" onclick="showTab('leaderboard')">Leaderboard</button>
</nav>

<!-- CLAIM -->
<div id="claim" class="card">
<h2 class="text-lg mb-3">Enter Secret Code</h2>
<input id="code" class="w-full p-3 text-black rounded mb-3">
<button onclick="claimCode()" class="w-full bg-orange-500 p-3 rounded">Claim Reward</button>
</div>

<!-- WALLET -->
<div id="wallet" class="card hidden">
<h2 class="text-lg mb-3">Your Coins</h2>
<div class="text-4xl text-yellow-400 font-bold mb-2" id="coins">0</div>
<div class="progress-bar"><div id="milestoneProgress" class="progress"></div></div>
<div id="milestones" class="text-sm mb-4"></div>

<button onclick="toggleReferral()" class="bg-blue-500 px-4 py-2 rounded mt-2">Refer a Friend</button>
<div id="refBox" class="hidden mt-3">
<input id="refMobile" placeholder="Friend Mobile" class="w-full p-3 text-black rounded mb-2">
<button onclick="referFriend()" class="bg-green-500 w-full p-2 rounded">Send Referral & Share</button>
</div>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard" class="card hidden">
<h2 class="text-lg mb-3">Top Foodies</h2>
<div id="board"></div>
</div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycby8809DKT91EJ_DxYHv1fkUs90yqQ_rV4AZxWKfi2lVBwGFwvzxyIJn62fBLEq55dfs/exec";
let mobile=null, generatedOTP=null;

function popup(msg){ const p=document.getElementById("popup"); p.innerText=msg; p.classList.add("show"); setTimeout(()=>p.classList.remove("show"),3000); }

function sendOTP(){ mobile=document.getElementById("mobile").value; if(mobile.length!=10){popup("Enter valid mobile");return;} generatedOTP=Math.floor(1000+Math.random()*9000); popup("OTP Sent: "+generatedOTP); document.getElementById("login").classList.add("hidden"); document.getElementById("otpBox").classList.remove("hidden"); }

async function verifyOTP(){
  if(document.getElementById("otp").value==generatedOTP){
    let res=await api({action:"login", mobile})
    if(res.success){ localStorage.setItem("easygo_user", mobile); startApp(); } else popup("Login failed")
  } else popup("Invalid OTP")
}

window.onload=()=>{ let saved=localStorage.getItem("easygo_user"); if(saved){ mobile=saved; startApp() } }

function startApp(){ document.getElementById("login").style.display="none"; document.getElementById("otpBox").style.display="none"; document.getElementById("app").classList.remove("hidden"); loadWallet(); loadLeaderboard(); }

function showTab(id){ ["claim","wallet","leaderboard"].forEach(t=>document.getElementById(t).classList.add("hidden")); document.getElementById(id).classList.remove("hidden"); }

async function api(data){ let res=await fetch(API,{method:"POST",body:JSON.stringify(data)}); return await res.json(); }

const milestonesArr=[ {coins:100,text:"Free Cheese Ball"}, {coins:200,text:"Cheese Corn Nuggets"}, {coins:400,text:"2 Spring Rolls"}, {coins:700,text:"Free Fries"}, {coins:1000,text:"Veg Steam Momos"} ];

async function loadWallet(){
  let res=await api({action:"wallet",mobile});
  animateCoins(res.coins);
  if(res.expired>0) popup(res.expired+" coins expired");
  if(res.expiringSoon>0) popup(res.expiringSoon+" coins expiring soon!");
  updateMilestones(res.coins);
}

function animateCoins(target){
  let el=document.getElementById("coins"), c=0;
  let i=setInterval(()=>{
    c+=5; if(c>=target){ c=target; clearInterval(i) }
    el.innerText=c
  },10)
}

function updateMilestones(coins){
  const bar=document.getElementById("milestoneProgress");
  let nextMilestone = milestonesArr.find(m=>m.coins>coins)?.coins || milestonesArr[milestonesArr.length-1].coins;
  let prevMilestone = milestonesArr.filter(m=>m.coins<=coins).pop()?.coins || 0;
  bar.style.width=Math.min(100,((coins-prevMilestone)/(nextMilestone-prevMilestone)*100))+"%";

  const mDiv=document.getElementById("milestones"); mDiv.innerHTML="";
  milestonesArr.forEach(m=>{
    mDiv.innerHTML+=`<div class="milestone-badge ${coins>=m.coins?'reached':''}">${m.coins} → ${m.text}</div>`;
  })
}

/* CLAIM CODE */
async function claimCode(){
  let code=document.getElementById("code").value;
  let res=await api({action:"claim",mobile,code});
  if(res.error){popup(res.error); return}
  // coin fly animation
  const start=document.getElementById("claim").getBoundingClientRect();
  const end=document.getElementById("coins").getBoundingClientRect();
  for(let i=0;i<res.coins;i+=5){
    let c=document.createElement("div"); c.className="coin-fly"; document.body.appendChild(c);
    c.style.left=start.left+start.width/2+"px"; c.style.top=start.top+"px";
    let dx=end.left-start.left; let dy=end.top-start.top;
    c.animate([{transform:`translate(0px,0px)`},{transform:`translate(${dx}px,${dy}px)`}],{duration:600,fill:"forwards"});
    setTimeout(()=>c.remove(),700);
  }
  confetti({particleCount:100,spread:70,origin:{y:0.6}});
  popup("Reward Claimed: "+res.coins+" coins"); loadWallet(); loadLeaderboard();
}

/* REFERRAL */
function toggleReferral(){ document.getElementById("refBox").classList.toggle("hidden") }
async function referFriend(){
  let friend=document.getElementById("refMobile").value;
  if(friend.length!=10){popup("Enter valid mobile");return;}
  let res=await api({action:"refer",mobile,friend});
  if(res.success){
    popup(res.message);
    // WhatsApp share
    let msg=`Join EasyGo VIP Rewards! Claim your coins and goodies. My invite code: ${mobile}`;
    let url=`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`;
    window.open(url,'_blank');
    loadWallet();
  } else popup(res.error)
}

/* LEADERBOARD */
async function loadLeaderboard(){
  let res=await api({action:"leaderboard"});
  let board=document.getElementById("board"); board.innerHTML="";
  res.forEach((u,i)=>{
    let medal=i==0?"🥇":i==1?"🥈":i==2?"🥉":"#"+(i+1);
    let number="XX"+String(u.mobile).slice(-4); // privacy
    board.innerHTML+=`<div class="flex justify-between border-b py-2"><span class="medal ${i<3?'animated':''}">${medal}</span><span>${number}</span><span>${u.coins} coins</span></div>`;
  })
}
</script>

</body>
</html>
