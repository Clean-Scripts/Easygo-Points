<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EasyGo Rewards</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{

background:linear-gradient(135deg,#020024,#090979,#00d4ff);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;

}

.container{

width:95%;
max-width:1100px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(20px);

border-radius:20px;

padding:25px;

box-shadow:0 0 40px rgba(0,255,255,0.2);

animation:fadeIn 1s ease;

}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

.title{

text-align:center;
font-size:30px;
font-weight:700;
margin-bottom:20px;

background:linear-gradient(90deg,#00ffff,#00ff88);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.loginBox{

display:flex;
gap:10px;
margin-bottom:20px;

}

input{

flex:1;
padding:12px;
border:none;
border-radius:10px;

}

button{

padding:12px 20px;
border:none;
border-radius:10px;
background:#00ffe7;
color:#000;
font-weight:600;
cursor:pointer;
transition:0.3s;

}

button:hover{

transform:scale(1.1);
box-shadow:0 0 20px #00fff7;

}

.wallet{

margin-top:10px;
font-size:18px;
text-align:center;

}

.section{

margin-top:30px;

}

.leaderboard{

margin-top:15px;

}

.row{

display:flex;
justify-content:space-between;
padding:12px;
margin-bottom:10px;

border-radius:12px;

background:rgba(255,255,255,0.08);

transition:0.3s;

}

.row:hover{

transform:scale(1.03);
background:rgba(255,255,255,0.15);

}

.rank{

font-weight:700;

}

.coins{

color:#00ffe7;

font-weight:700;

}

.top1{

background:linear-gradient(90deg,#ff00cc,#3333ff);
box-shadow:0 0 20px #ff00ff;

}

.top2{

background:linear-gradient(90deg,#00ffcc,#0066ff);

}

.top3{

background:linear-gradient(90deg,#ffcc00,#ff6600);

}

.claimBox{

display:flex;
gap:10px;
margin-top:10px;

}

.refBox{

display:flex;
gap:10px;
margin-top:10px;

}

@media(max-width:700px){

.title{font-size:24px}

.row{font-size:14px}

}

</style>

</head>

<body>

<div class="container">

<div class="title">⚡ EASYGO REWARDS ⚡</div>

<div class="loginBox">

<input id="mobile" placeholder="Enter Mobile Number">

<button onclick="login()">Login</button>

</div>

<div class="wallet">

Wallet Coins: <span id="coins">0</span>

</div>

<div class="section">

<h3>Claim Code</h3>

<div class="claimBox">

<input id="code" placeholder="Enter Code">

<button onclick="claim()">Claim</button>

</div>

</div>

<div class="section">

<h3>Refer Friend</h3>

<div class="refBox">

<input id="friend" placeholder="Friend Mobile">

<button onclick="refer()">Refer</button>

</div>

</div>

<div class="section">

<h3>🏆 TOP FOODIES</h3>

<div id="leaderboard" class="leaderboard"></div>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbw718vXjWW1Wk123BeL3QX0mvDktu49YrTRdzNVExjwMM4gm8OPpYZi2gBoRRhuVvkF9g/exec"

let currentMobile=""

function login(){

const mobile=document.getElementById("mobile").value

currentMobile=mobile

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"login",
mobile:mobile
})
})
.then(r=>r.json())
.then(d=>{

document.getElementById("coins").innerText=d.coins

loadLeaderboard()

})

}

function claim(){

const code=document.getElementById("code").value

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"claim",
mobile:currentMobile,
code:code
})
})
.then(r=>r.json())
.then(d=>{

if(d.success){

alert("Coins Added: "+d.coins)

login()

}else{

alert(d.error)

}

})

}

function refer(){

const friend=document.getElementById("friend").value

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"refer",
mobile:currentMobile,
friend:friend
})
})
.then(r=>r.json())
.then(d=>{

alert(JSON.stringify(d))

})

}

function loadLeaderboard(){

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"leaderboard"
})
})
.then(r=>r.json())
.then(data=>{

const board=document.getElementById("leaderboard")

board.innerHTML=""

data.forEach((u,i)=>{

let cls="row"

if(i==0) cls+=" top1"
if(i==1) cls+=" top2"
if(i==2) cls+=" top3"

board.innerHTML+=`

<div class="${cls}">

<div class="rank">#${u.rank}</div>

<div>${u.mobile}</div>

<div class="coins">${u.coins} ⭐</div>

</div>

`

})

})

}

</script>

</body>
</html>
