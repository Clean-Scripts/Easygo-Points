<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EasyGo VIP</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body class="bg-orange-50 min-h-screen flex items-center justify-center">

<!-- LOADER -->

<div id="loader" class="fixed inset-0 bg-black flex items-center justify-center text-white z-50">

<div class="text-center">

<img src="EasyGo-Logo.png" class="h-24 mx-auto animate-bounce">

<p class="mt-4 animate-pulse text-lg">
Checking your VIP rewards...
</p>

</div>

</div>

<div class="max-w-md w-full p-5 space-y-5">

<!-- LOGIN -->

<div id="login" class="bg-white p-6 rounded-xl shadow">

<h1 class="text-2xl font-bold text-center mb-4">

EasyGo VIP

</h1>

<input id="mobile"
placeholder="Enter mobile"
class="w-full border p-3 rounded-lg">

<button onclick="login()"
class="w-full bg-orange-500 text-white p-3 rounded-lg mt-4">

Login

</button>

</div>

<!-- APP -->

<div id="app" class="hidden space-y-5">

<!-- WALLET -->

<div class="bg-white p-6 rounded-xl shadow text-center">

<h2 class="font-bold text-xl">

Wallet

</h2>

<div id="coins"
class="text-5xl text-orange-500 font-bold mt-3">

0

</div>

<p class="text-gray-500">
Coins
</p>

</div>

<!-- PROGRESS BAR -->

<div class="bg-white p-6 rounded-xl shadow">

<p class="mb-2 font-bold">
Next Reward
</p>

<div class="w-full bg-gray-200 h-4 rounded">

<div id="progress"
class="bg-orange-500 h-4 rounded"
style="width:0%">

</div>

</div>

<p id="progressText"
class="text-sm mt-2 text-gray-600">
0 / 100 coins
</p>

</div>

<!-- CLAIM -->

<div class="bg-white p-6 rounded-xl shadow">

<h2 class="font-bold mb-3">
Enter Secret Code
</h2>

<div class="flex gap-2">

<input id="code"
class="flex-1 border p-3 rounded">

<button onclick="claim()"
class="bg-orange-500 text-white px-5 rounded">

Claim

</button>

</div>

</div>

<!-- LEADERBOARD -->

<div class="bg-white p-6 rounded-xl shadow">

<h2 class="font-bold mb-4">

Leaderboard

</h2>

<div id="leaderboard"
class="space-y-2">

</div>

</div>

<!-- ORDER -->

<a href="https://clean-scripts.github.io/Easygo-Menu/"

class="block text-center bg-red-600 text-white p-4 rounded-xl font-bold">

Order Now

</a>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyldefvCSAHT7h1abihhwQUHAaIpJrk8K_9uOR93qGhfdeiXbJAcKXSK9hiDKdo-ykQzw/exec"

let mobile=null

async function api(data){

const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
})

return await res.json()

}

window.onload=()=>{

const saved=localStorage.getItem("easygo_user")

if(saved){

mobile=saved
startApp()

}else{

loader.style.display="none"

}

}

function login(){

mobile=document.getElementById("mobile").value

if(mobile.length!=10){
alert("Enter valid mobile")
return
}

localStorage.setItem("easygo_user",mobile)

startApp()

}

function startApp(){

loginDiv=document.getElementById("login")

loginDiv.classList.add("hidden")

Promise.all([

loadWallet(),
loadLeaderboard()

]).then(()=>{

loader.style.display="none"
app.classList.remove("hidden")

})

}

async function loadWallet(){

const res=await api({
action:"wallet",
mobile:mobile
})

animateCoins(res.coins)

updateProgress(res.coins)

}

function updateProgress(coins){

let percent=(coins%100)

percent=percent

document.getElementById("progress")
.style.width=percent+"%"

document.getElementById("progressText")
.innerText=coins+" / 100 coins"

}

async function loadLeaderboard(){

const res=await api({
action:"leaderboard"
})

const board=document.getElementById("leaderboard")

board.innerHTML=""

res.forEach((u,i)=>{

let medal=""

if(i==0) medal="🥇"
if(i==1) medal="🥈"
if(i==2) medal="🥉"

const div=document.createElement("div")

div.className="flex justify-between bg-orange-50 p-3 rounded"

div.innerHTML=`

<span>

${medal} XX${String(u[0]).slice(-4)}

</span>

<span>

${u[1]} coins

</span>

`

board.appendChild(div)

})

}

async function claim(){

const code=document.getElementById("code").value

const btn=event.target

btn.innerText="Checking..."

const res=await api({
action:"claim",
mobile:mobile,
code:code
})

if(res.error){

alert(res.error)
btn.innerText="Claim"
return

}

confetti({
particleCount:200,
spread:90
})

loadWallet()

btn.innerText="Claim"

}

function animateCoins(target){

const el=document.getElementById("coins")

let current=0

const interval=setInterval(()=>{

current+=3

if(current>=target){

current=target
clearInterval(interval)

}

el.innerText=current

},20)

}

</script>

</body>
</html>
