<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EasyGo VIP</title>
<link rel="icon" href="EasyGo-Logo.png" type="image/png">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
color:white;
height:100vh;
background:url('background.png') no-repeat center/cover;
}

.app{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
padding:20px;
border-radius:26px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
animation:fadeUp .5s;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:14px 20px;
border-radius:8px;
display:none;
z-index:9999;
font-weight:bold;
}

.show{display:block;}

button{
font-weight:bold;
transition:.4s cubic-bezier(.175,.885,.32,1.275);
cursor:pointer;
border:none;
border-radius:50px;
padding:12px 24px;
display:flex;
align-items:center;
justify-content:center;
text-transform:uppercase;
letter-spacing:.5px;
font-size:14px;
}

button:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.progress-bar{
height:20px;
background:#222;
border-radius:10px;
overflow:hidden;
margin:10px 0;
}

.progress{
height:100%;
background:linear-gradient(90deg,#facc15,#f97316);
width:0;
transition:.5s;
}

.milestone-badge{
display:inline-block;
margin:2px;
padding:4px 8px;
border-radius:8px;
background:#222;
color:#fff;
transition:.3s;
}

.milestone-badge.reached{
background:yellow;
color:black;
font-weight:bold;
transform:scale(1.1);
}

</style>
</head>

<body>

<div id="popup" class="popup"></div>

<!-- LAUNCH OFFER -->
<div id="welcomeBanner" class="fixed inset-0 bg-black/70 flex items-center justify-center z-[9999] hidden">
<div class="bg-white text-black p-6 rounded-3xl max-w-sm text-center shadow-2xl">

<h2 class="text-2xl font-bold mb-2 text-orange-600">
🔥 VIP Launch Offer
</h2>

<p class="text-sm mb-4">
🎁 First 30 Foodies Only!<br>
Apne 1st Claim par seedha 30 Bonus Coins 🪙
</p>

<button onclick="closeWelcome()"
class="bg-orange-500 text-white px-6 py-2 rounded-full">
Awesome
</button>

</div>
</div>

<div class="app">

<div class="text-center mb-6">
<img src="EasyGo-Logo.png" class="h-16 mx-auto">
<h1 class="text-3xl font-bold mt-2">EasyGo VIP Rewards</h1>
</div>

<!-- LOGIN -->

<div id="login" class="card">

<h2 class="text-xl mb-4 text-center font-bold">Login</h2>

<input id="mobile" type="tel"
placeholder="Enter Mobile Number"
class="w-full p-4 text-black rounded-2xl mb-4">

<button onclick="sendOTP()" class="w-full bg-orange-500 text-white">
Send OTP
</button>

</div>

<!-- OTP -->

<div id="otpBox" class="card hidden">

<h2 class="text-xl mb-4 text-center font-bold">Enter OTP</h2>

<input id="otp" type="number"
placeholder="Enter OTP"
class="w-full p-4 text-black rounded-2xl mb-4">

<button onclick="verifyOTP()" class="w-full bg-green-500 text-white">
Verify OTP
</button>

</div>

<!-- APP -->

<div id="app" class="hidden">

<nav class="flex justify-between gap-2 mb-6 bg-black/30 p-2 rounded-[40px]">

<button class="bg-orange-500 text-white flex-1" onclick="showTab('claim')">
Claim
</button>

<button class="bg-yellow-500 text-black flex-1" onclick="showTab('wallet')">
Wallet
</button>

<button class="bg-purple-600 text-white flex-1" onclick="showTab('leaderboard')">
Board
</button>

</nav>

<!-- CLAIM -->

<div id="claim" class="card">

<input id="code"
placeholder="Enter Secret Code"
class="w-full p-4 text-black rounded-2xl mb-4">

<button onclick="claimCode()" class="w-full bg-orange-500 text-white">
Claim Reward
</button>

</div>

<!-- WALLET -->

<div id="wallet" class="card hidden">

<h2 class="text-lg mb-3">Your Coins</h2>

<div class="text-4xl text-yellow-400 font-bold mb-2" id="coins">0</div>

<div class="progress-bar">
<div id="milestoneProgress" class="progress"></div>
</div>

<div id="milestones" class="text-sm mb-4"></div>

<button onclick="redeemReward()" class="bg-green-600 text-white w-full">
Redeem Reward
</button>

<button id="reminderBtn"
onclick="sendReminder()"
class="bg-red-600 text-white w-full hidden">
Send Expiry Reminder
</button>

</div>

<!-- LEADERBOARD -->

<div id="leaderboard" class="card hidden">

<h2 class="text-xl font-bold mb-4">Top Foodies</h2>

<div id="board" class="space-y-2"></div>

</div>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx-wK_hJpZBNN6S2IGRHDzwvB9U50Z7Flit1e74MK_qd1-kULZnt33PK9tBlC6Dl4Td/exec"

let mobile=null
let generatedOTP=null

function popup(msg){

const p=document.getElementById("popup")

p.innerText=msg

p.classList.add("show")

setTimeout(()=>p.classList.remove("show"),3000)

}

async function api(data){

let res=await fetch(API,{
method:"POST",
body:JSON.stringify(data)
})

return await res.json()

}

function sendOTP(){

mobile=document.getElementById("mobile").value

if(mobile.length!=10){
popup("Enter valid mobile")
return
}

generatedOTP=Math.floor(1000+Math.random()*9000)

popup("OTP "+generatedOTP)

document.getElementById("login").classList.add("hidden")

document.getElementById("otpBox").classList.remove("hidden")

}

async function verifyOTP(){

if(document.getElementById("otp").value==generatedOTP){

let res=await api({action:"login",mobile})

if(res.success){

localStorage.setItem("easygo_user",mobile)

startApp()

if(res.showOffer){
document.getElementById("welcomeBanner").classList.remove("hidden")
}

}

}else popup("Invalid OTP")

}

function closeWelcome(){

document.getElementById("welcomeBanner").classList.add("hidden")

}

window.onload=()=>{

let saved=localStorage.getItem("easygo_user")

if(saved){

mobile=saved

startApp()

}

}

function startApp(){

document.getElementById("login").style.display="none"

document.getElementById("otpBox").style.display="none"

document.getElementById("app").classList.remove("hidden")

if(mobile=="7651837322"){
document.getElementById("reminderBtn").classList.remove("hidden")
}

loadWallet()

loadLeaderboard()

}

function showTab(id){

["claim","wallet","leaderboard"].forEach(t=>document.getElementById(t).classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

}

async function loadWallet(){

let res=await api({action:"wallet",mobile})

document.getElementById("coins").innerText=res.coins

}

async function claimCode(){

let code=document.getElementById("code").value

let res=await api({action:"claim",mobile,code})

if(res.error){
popup(res.error)
return
}

confetti({particleCount:100,spread:70})

popup("Reward Claimed")

loadWallet()

}

async function redeemReward(){

let coins=document.getElementById("coins").innerText

if(coins<90){
popup("Not enough coins")
return
}

let item="Reward Item"

await api({action:"redeem",mobile,item})

let msg=encodeURIComponent(
"User "+mobile+" redeemed "+item
)

window.open("https://wa.me/917651837322?text="+msg)

popup("Show to shopkeeper")

loadWallet()

}

function sendReminder(){

let msg=encodeURIComponent(
"🔥 EasyGo VIP Reminder\n\nAapke coins expire hone wale hai.\nJaldi redeem kare."
)

window.open("https://wa.me/?text="+msg)

}

async function loadLeaderboard(){

let res=await api({action:"leaderboard"})

let board=document.getElementById("board")

board.innerHTML=""

res.forEach((u,i)=>{

board.innerHTML+=`

<div class="flex justify-between border-b border-white/10 py-2">

<span>${i+1}</span>

<span>XX${String(u.mobile).slice(-4)}</span>

<span>${u.coins}</span>

</div>

`

})

}

</script>

</body>
</html>
