<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EasyGo Rewards</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="icon" href="EasyGo-Logo.png">

<style>

body{
background:url("background.png");
background-size:cover;
background-position:center;
}

.glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
}

.medal1{background:gold;color:black}
.medal2{background:silver;color:black}
.medal3{background:#cd7f32;color:white}

.fade{
animation:fade .5s
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

</style>

</head>

<body class="min-h-screen flex items-center justify-center text-white">

<div class="max-w-md w-full p-5 space-y-6">

<!-- LOGIN PAGE -->

<div id="login" class="glass p-6 rounded-2xl shadow-xl">

<div class="text-center mb-5">

<img src="EasyGo-Logo.png" class="h-16 mx-auto">

<h1 class="text-2xl font-bold mt-3">EasyGo VIP</h1>

</div>

<input id="mobile" placeholder="Enter Mobile Number"
class="w-full p-3 rounded-xl text-black">

<button onclick="sendOTP()"
class="mt-4 w-full bg-orange-500 p-3 rounded-xl">

Send OTP

</button>

</div>


<!-- OTP POPUP -->

<div id="otpPopup"
class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">

<div class="glass p-6 rounded-xl w-72 text-center">

<h2 class="text-lg font-bold">OTP Verification</h2>

<input id="otp"
class="mt-4 w-full p-3 rounded-xl text-black">

<button onclick="verifyOTP()"
class="mt-4 bg-green-500 w-full p-3 rounded-xl">

Verify

</button>

</div>

</div>



<!-- APP -->

<div id="app" class="hidden space-y-6 fade">

<!-- NAVBAR -->

<div class="flex justify-between gap-2">

<button onclick="showPage('claim')" class="bg-orange-500 p-2 rounded-xl flex-1">Claim Code</button>

<button onclick="showPage('wallet')" class="bg-blue-500 p-2 rounded-xl flex-1">Wallet</button>

<button onclick="showPage('leader')" class="bg-purple-500 p-2 rounded-xl flex-1">Leaderboard</button>

</div>


<!-- CLAIM -->

<div id="claim" class="glass p-6 rounded-xl">

<h2 class="font-bold mb-3">Enter Code</h2>

<input id="code" class="w-full p-3 rounded-xl text-black">

<button onclick="claim()" class="mt-3 w-full bg-orange-500 p-3 rounded-xl">

Claim Reward

</button>

</div>


<!-- WALLET -->

<div id="wallet" class="hidden glass p-6 rounded-xl">

<h2 class="text-xl font-bold text-center">Coins</h2>

<div id="coins" class="text-4xl text-center mt-3">0</div>

<!-- REFER -->

<div class="mt-6">

<h3 class="font-bold">Refer Friend</h3>

<div class="flex gap-2 mt-2">

<input id="friend" class="flex-1 p-2 rounded-xl text-black">

<button onclick="refer()" class="bg-blue-500 px-3 rounded-xl">

Add

</button>

</div>

</div>

<!-- MILESTONES -->

<div class="mt-6">

<h3 class="font-bold">Milestones</h3>

<div class="space-y-2 mt-3">

<button onclick="redeem(100)" class="w-full bg-green-500 p-2 rounded-xl">
100 Coins → Cheese Ball
</button>

<button onclick="redeem(200)" class="w-full bg-green-500 p-2 rounded-xl">
200 Coins → Cheese Corn Nugget
</button>

<button onclick="redeem(300)" class="w-full bg-green-500 p-2 rounded-xl">
300 Coins → 2 Spring Rolls
</button>

<button onclick="redeem(500)" class="w-full bg-green-500 p-2 rounded-xl">
500 Coins → Free Fries
</button>

<button onclick="redeem(800)" class="w-full bg-green-500 p-2 rounded-xl">
800 Coins → Veg Steam Momos
</button>

</div>

</div>

</div>



<!-- LEADERBOARD -->

<div id="leader" class="hidden glass p-6 rounded-xl">

<h2 class="font-bold mb-3">Top Foodies</h2>

<div id="board" class="space-y-2"></div>

</div>

</div>

</div>


<!-- POPUP -->

<div id="popup"
class="hidden fixed bottom-6 left-1/2 -translate-x-1/2
bg-black text-white px-5 py-3 rounded-xl">

Message

</div>



<script>

const API_URL="https://script.google.com/macros/s/AKfycbw718vXjWW1Wk123BeL3QX0mvDktu49YrTRdzNVExjwMM4gm8OPpYZi2gBoRRhuVvkF9g/exec"

let mobile=null

function popup(msg){

const p=document.getElementById("popup")

p.innerText=msg
p.classList.remove("hidden")

setTimeout(()=>p.classList.add("hidden"),2500)

}

function sendOTP(){

document.getElementById("otpPopup").classList.remove("hidden")

setTimeout(()=>{

document.getElementById("otp").value="1234"

},1200)

}

function verifyOTP(){

mobile=document.getElementById("mobile").value

localStorage.setItem("easygo",mobile)

startApp()

}

function startApp(){

document.getElementById("login").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

loadWallet()
loadLeaderboard()

}

function showPage(p){

["claim","wallet","leader"].forEach(id=>{

document.getElementById(id).classList.add("hidden")

})

document.getElementById(p).classList.remove("hidden")

}

async function api(data){

const r=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
})

return await r.json()

}

async function loadWallet(){

const res=await api({
action:"wallet",
mobile:mobile
})

document.getElementById("coins").innerText=res.coins

}

async function claim(){

const code=document.getElementById("code").value

const res=await api({
action:"claim",
mobile:mobile,
code:code
})

if(res.success){

popup("Coins Added "+res.coins)

loadWallet()

}else{

popup(res.error)

}

}

async function refer(){

const friend=document.getElementById("friend").value

const res=await api({
action:"refer",
mobile:mobile,
friend:friend
})

if(res.success) popup("Referral Added")
else popup(res.error)

}

function redeem(cost){

const coins=Number(document.getElementById("coins").innerText)

if(coins<cost){
popup("Not enough coins")
return
}

popup("Reward Redeemed")

document.getElementById("coins").innerText=coins-cost

}

async function loadLeaderboard(){

const res=await api({
action:"leaderboard"
})

const board=document.getElementById("board")

board.innerHTML=""

res.forEach((u,i)=>{

let medal=""

if(i==0) medal="🥇"
if(i==1) medal="🥈"
if(i==2) medal="🥉"

board.innerHTML+=`

<div class="flex justify-between p-2 bg-white/20 rounded-xl">

<span>${medal} XX${u[0].slice(-4)}</span>

<span>${u[1]} Coins</span>

</div>

`

})

}

</script>

</body>
</html>
