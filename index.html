<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>EasyGo VIP</title>
    <link rel="icon" href="EasyGo-Logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin:0; font-family: 'Segoe UI', Roboto, sans-serif; color:white; min-height:100vh; background:url('background.png') no-repeat center/cover fixed; overflow-x: hidden; }
        .card { background:rgba(255, 255, 255, 0.05); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); padding:24px; border-radius:32px; border:1px solid rgba(255,255,255,0.1); box-shadow:0 20px 50px rgba(0,0,0,0.4); animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes slideUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
        .popup { position:fixed; top:25px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.9); color:#fbbf24; border:1px solid #fbbf24; padding:16px 28px; border-radius:16px; display:none; z-index:9999; font-weight:bold; box-shadow:0 0 20px rgba(251,191,36,0.3); }
        .show { display:block; animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        @keyframes popIn { from{transform:translateX(-50%) scale(0.8); opacity:0} to{transform:translateX(-50%) scale(1); opacity:1} }
        button { transition: all 0.3s ease; font-weight:800; text-transform:uppercase; letter-spacing:1px; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:active { transform: scale(0.96); }
        select, input { background: rgba(255,255,255,0.9) !important; color: #000 !important; font-weight: 600; }
        .otp-input { letter-spacing: 12px; font-size: 24px; text-align: center; }
        .loader-bar { width: 0%; height: 4px; background: #f59e0b; transition: width 1.5s linear; border-radius: 2px; }
    </style>
</head>
<body class="flex justify-center">

<div id="popup" class="popup"></div>

<div id="welcomeBanner" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[9999] hidden p-5">
    <div class="bg-white text-black p-6 rounded-[32px] max-w-sm w-full shadow-2xl max-h-[85vh] flex flex-col">
        
        <div id="offerContainer" class="overflow-y-auto flex-1 pr-2 custom-scrollbar">
            </div>
        
        <button onclick="closeWelcome()" class="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white py-4 rounded-2xl shadow-lg mt-5 font-black tracking-widest">
            CLAIM NOW ! 🔥
        </button>
    </div>
</div>

<style>
    /* Chota sa scrollbar design taaki bura na lage */
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
</style>

<div class="w-full max-w-[420px] p-6 mx-auto"> 
    <div class="text-center mb-10">
        <img src="EasyGo-Logo.png" class="h-24 mx-auto drop-shadow-[0_0_20px_rgba(255,255,255,0.4)] hover:scale-105 transition-transform"> 
        <h1 class="text-4xl font-black mt-4 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 drop-shadow-sm">
            EASYGO VIP
        </h1>
    </div>

    <div id="login" class="card">
        <h2 class="text-xl mb-5 font-black text-center opacity-90">MEMBER LOGIN</h2>
        <input id="mobile" type="tel" maxlength="10" placeholder="Enter Mobile Number" class="w-full p-5 rounded-2xl mb-5 outline-none text-xl shadow-inner">
        <button onclick="sendOTP()" class="w-full bg-gradient-to-r from-orange-500 to-red-600 py-5 text-white rounded-2xl shadow-xl shadow-orange-900/40">Get OTP</button>
    </div>

    <div id="otpBox" class="card hidden">
        <h2 class="text-xl mb-2 font-black text-center">VERIFYING</h2>
        <p class="text-center text-sm opacity-60 mb-6">Reading OTP automatically...</p>
        <input id="otp" type="number" placeholder="0000" class="otp-input w-full p-5 rounded-2xl mb-4 outline-none shadow-inner">
        <div class="w-full bg-gray-800 rounded-full h-1 mb-6 overflow-hidden">
            <div id="otpLoader" class="loader-bar"></div>
        </div>
        <button onclick="verifyOTP()" class="w-full bg-green-500 py-4 text-white rounded-2xl opacity-50 cursor-not-allowed" id="verifyBtn" disabled>Verifying...</button>
    </div>

    <div id="app" class="hidden space-y-6">
        <nav class="flex justify-between gap-3 bg-black/40 p-2 rounded-[28px] border border-white/10">
            <button class="bg-orange-500 text-white flex-1 py-3 rounded-2xl text-xs" onclick="showTab('claim')">CLAIM</button>
            <button class="bg-yellow-500 text-black flex-1 py-3 rounded-2xl text-xs" onclick="showTab('wallet')">WALLET</button>
            <button class="bg-purple-600 text-white flex-1 py-3 rounded-2xl text-xs" onclick="showTab('leaderboard')">BOARD</button>
        </nav>

        <div id="claim" class="tab-content card">
            <h2 class="text-xl font-black mb-4">REDEEM CODE</h2>
            <input id="code" placeholder="Enter Secret Code" class="w-full p-5 rounded-2xl mb-5 uppercase font-mono tracking-widest outline-none">
            <button onclick="claimCode()" class="w-full bg-orange-600 py-5 rounded-2xl text-white shadow-lg">Submit Code</button>
        </div>

        <div id="wallet" class="tab-content card hidden">
            <h2 class="text-sm font-bold opacity-60 mb-1">CURRENT BALANCE</h2>
            <div class="text-6xl text-yellow-400 font-black mb-8 drop-shadow-md" id="coins">🪙</div>

            <h3 class="text-md font-bold mb-3 text-orange-400">REDEEM COINS</h3>
            <select id="redeemItem" class="w-full p-4 rounded-2xl mb-5 outline-none appearance-none cursor-pointer">
                <option value="90">[2 Pcs] Crispy Mini Samosas 🥟 — 90🪙</option>
                <option value="100">[2 Pcs] Crunchy Cheese Balls 🧀 — 100🪙</option>
                <option value="150">[70 G] French Fries 🍟 — 150🪙</option>
                <option value="200">[2 Pcs] Cheese Corn Nuggets 🌽 — 200🪙</option>
                <option value="250">[5 Pcs] Veg Momos 🥟 — 250🪙</option>
                <option value="300">[4 Pcs] Spring Roll 🥢 — 300🪙</option>
                <option value="350">[5 Pcs] Premium Paneer Momos 🧀 — 350🪙</option>
                <option value="400">Full Plate Veg Momos 🍜 — 400🪙</option>
                <option value="450">Full Plate Cheese Corn Nuggets 🌽 — 450🪙</option>
                <option value="500">VIP 👑 Combo — [7 Pcs] Momos + Fries — 500🪙</option>
            </select>
            <button onclick="redeemCoins()" class="w-full bg-green-500 py-5 rounded-2xl text-white shadow-xl shadow-green-900/30 font-black">
                Redeem Now 🪙
            </button>
        </div>

        <div id="leaderboard" class="tab-content card hidden">
            <h2 class="text-xl font-black mb-6 flex items-center justify-between">
                TOP FOODIES 🏆
            </h2>
            <div id="board" class="space-y-4"></div>
        </div>
    </div>
</div>

<script>
    const API="https://script.google.com/macros/s/AKfycbysfriqRDdJqYRAHKnRZeL8yA4gdz49WzVG3PqKFRyy2lTxGS8a4BTS1CZDYhwhggux/exec";
    let mobile, generatedOTP;

    function popup(msg) {
        const p = document.getElementById("popup");
        p.innerText = msg;
        p.classList.add("show");
        setTimeout(() => p.classList.remove("show"), 3000);
    }

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    async function api(data) {
        let res = await fetch(API, { method: "POST", body: JSON.stringify(data) });
        return await res.json();
    }

async function sendOTP() {
    mobile = document.getElementById("mobile").value;
    if(mobile.length !== 10) return popup("Enter 10 digit mobile!");

    // Button loading state (Optional but good for UI)
    const btn = document.querySelector("#login button");
    btn.innerText = "Sending...";
    btn.disabled = true;

    // Backend se OTP mangwana
    let res = await api({ action: "sendOTP", mobile });
    
    if(res.success) {
        generatedOTP = res.otp; // Backend ne jo OTP bheja wo yahan save hoga
        popup("OTP Sent: " + generatedOTP);

        // UI Change: Login chhupao, OTP dikhao
        document.getElementById("login").classList.add("hidden");
        document.getElementById("otpBox").classList.remove("hidden");

        // AUTO-FILL & AUTO-LOGIN LOGIC
        setTimeout(() => {
            document.getElementById("otpLoader").style.width = "100%";
            setTimeout(() => {
                document.getElementById("otp").value = generatedOTP;
                verifyOTP(); // Auto-verify call
            }, 1500);
        }, 500);
    } else {
        popup("Error sending OTP");
        btn.innerText = "Get OTP";
        btn.disabled = false;
    }
}

async function verifyOTP() {
    if(document.getElementById("otp").value == generatedOTP) {
        let res = await api({ action: "login", mobile });
        
        if(res.success) {
            localStorage.setItem("easygo_user", mobile);
            
            if(res.offers && res.offers.length > 0) {
                const container = document.getElementById("offerContainer");
                container.innerHTML = `<h3 class="text-center font-black text-gray-400 text-xs mb-4 tracking-widest uppercase">Special Offers For You</h3>`;

                res.offers.forEach((offer, index) => {
                    container.innerHTML += `
                        <div class="relative py-4">
                            <h2 class="text-xl font-black text-orange-600 italic leading-tight">${offer.title}</h2>
                            
                            <p class="text-gray-600 text-sm mt-1 font-medium leading-relaxed">${offer.message}</p>
                            
                            <div class="mt-3 inline-block bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-black border border-yellow-200">
                                VALUE: ${offer.value} 🪙
                            </div>

                            ${index !== res.offers.length - 1 ? '<div class="mt-5 border-b-2 border-dotted border-gray-100 w-full"></div>' : ''}
                        </div>
                    `;
                });

                document.getElementById("welcomeBanner").classList.remove("hidden");
            }

            startApp();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    } else {
        popup("Wrong OTP!");
    }
}

    function startApp() {
        document.getElementById("otpBox").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        loadWallet();
        loadLeaderboard();
    }

    async function loadWallet() {
        let res = await api({ action: "wallet", mobile });
        document.getElementById("coins").innerText = res.coins;
    }

async function redeemCoins() {
    let item = document.getElementById("redeemItem");
    let cost = item.value;
    let text = item.options[item.selectedIndex].text;

    // Confirm dialog
    if(!confirm(`Confirm Redeem: ${text}?`)) return;

    let res = await api({ action: "redeem", mobile, cost, item: text });
    
    if(res.success) {
        // Yahan humne text aur emoji ko ek sath encode kiya hai
        let messageBody = `Hi EasyGo! 🌟\n\nUser: ${mobile}\nRequested Redemption: ${text}\n\n Thank you! 🙏`;
        
        let encodedMsg = encodeURIComponent(messageBody);
        
        // WhatsApp link with encoded message
        window.open(`https://wa.me/917651837322?text=${encodedMsg}`);
        
        popup("Redeem Request Sent! ✅");
        loadWallet();
    } else {
        popup(res.error || "Insufficient Balance! ❌");
    }
}

    async function loadLeaderboard() {
        let res = await api({ action: "leaderboard" });
        let board = document.getElementById("board");
        board.innerHTML = res.map((u, i) => `
            <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                <div class="flex items-center gap-3">
                    <span class="text-xs font-bold bg-white/10 w-6 h-6 flex items-center justify-center rounded-full">${i+1}</span>
                    <span class="font-mono">XX${String(u.mobile).slice(-4)}</span>
                </div>
                <span class="font-black text-yellow-400">${u.coins} 🪙</span>
            </div>
        `).join('');
    }

    async function claimCode() {
    let code = document.getElementById("code").value;
    if(!code) return popup("Enter Secret Code!");
    
    let res = await api({ action: "claim", mobile, code });
    if(res.success) {
        confetti({ particleCount: 100, spread: 70 });
        popup(`Success! Added ${res.coins} Coins 🪙`);
        document.getElementById("code").value = ""; // Input clear karo
        loadWallet();
    } else {
        popup(res.error || "Invalid Code ❌");
    }
}
    function closeWelcome() { document.getElementById("welcomeBanner").classList.add("hidden"); }

    window.onload = async () => {
    let savedMobile = localStorage.getItem("easygo_user");
    
    if(savedMobile) {
        mobile = savedMobile;
        
        // Jab user refresh kare, toh backend se sirf offers aur wallet status mangwao
        let res = await api({ action: "login", mobile: mobile });
        
        if(res.success) {
            // Agar koi offers active hain, toh banner dikhao
            if(res.offers && res.offers.length > 0) {
                const container = document.getElementById("offerContainer");
                container.innerHTML = `<h3 class="text-center font-black text-gray-400 text-xs mb-4 tracking-widest uppercase">Ongoing Offers</h3>`;

                res.offers.forEach((offer, index) => {
                    container.innerHTML += `
                        <div class="relative py-4">
                            <h2 class="text-xl font-black text-orange-600 italic leading-tight">${offer.title}</h2>
                            <p class="text-gray-600 text-sm mt-1 font-medium leading-relaxed">${offer.message}</p>
                            <div class="mt-3 inline-block bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-black border border-yellow-200">
                                VALUE: ${offer.value} 🪙
                            </div>
                            ${index !== res.offers.length - 1 ? '<div class="mt-5 border-b-2 border-dotted border-gray-100 w-full"></div>' : ''}
                        </div>
                    `;
                });
                document.getElementById("welcomeBanner").classList.remove("hidden");
            }
            
            startApp();
        }
    }
};
</script>
</body>
</html>
