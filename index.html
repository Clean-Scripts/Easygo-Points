<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EasyGo VIP</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link rel="icon" href="EasyGo-Logo.png">

</head>


<body class="bg-orange-50 min-h-screen flex items-center justify-center">


<!-- LOADER -->

<div id="loader" class="fixed inset-0 bg-black flex items-center justify-center z-50">

<div class="text-center text-white">

<img src="EasyGo-Logo.png" class="h-24 mx-auto animate-bounce">

<p class="mt-5 text-lg animate-pulse">

Checking your VIP rewards...

</p>

</div>

</div>



<div class="max-w-md w-full p-5 space-y-6">

<!-- LOGIN -->

<div id="login" class="bg-white p-6 rounded-2xl shadow-xl">

<div class="text-center mb-6">

<img src="EasyGo-Logo.png" class="h-16 mx-auto">

<h1 class="text-2xl font-bold mt-3">

EasyGo VIP

</h1>

</div>

<input id="mobile" placeholder="Enter Mobile Number"

class="w-full border p-3 rounded-xl">

<button onclick="login()"

class="mt-4 w-full bg-orange-500 text-white p-3 rounded-xl font-bold">

Login

</button>

</div>



<!-- APP -->

<div id="app" class="hidden space-y-6">

<!-- WALLET -->

<div class="bg-white p-6 rounded-2xl shadow-xl text-center">

<h2 class="text-xl font-bold">Wallet</h2>

<div id="coins"

class="text-5xl text-orange-500 mt-3 font-bold">

0

</div>

<p class="text-gray-500">Coins</p>

<div id="tier" class="mt-2 font-bold"></div>

</div>



<!-- DAILY STREAK -->

<div class="bg-white p-6 rounded-2xl shadow-xl text-center">

<h2 class="font-bold mb-3">

🔥 Daily Streak

</h2>

<p id="streakText">

Login daily to earn coins

</p>

</div>



<!-- SPIN WHEEL -->

<div class="bg-white p-6 rounded-2xl shadow-xl text-center">

<h2 class="font-bold mb-3">

🎰 Daily Spin

</h2>

<button onclick="spin()"

class="bg-purple-600 text-white px-6 py-3 rounded-xl font-bold">

Spin Now

</button>

</div>



<!-- MYSTERY BOX -->

<div class="bg-white p-6 rounded-2xl shadow-xl text-center">

<h2 class="font-bold mb-3">

🎁 Mystery Box

</h2>

<button onclick="mystery()"

class="bg-green-600 text-white px-6 py-3 rounded-xl font-bold">

Open Box

</button>

</div>



<!-- REFERRAL -->

<div class="bg-white p-6 rounded-2xl shadow-xl">

<h2 class="font-bold mb-3">

Refer a Friend

</h2>

<div class="flex gap-2">

<input id="refMobile"

class="flex-1 border p-3 rounded-xl"

placeholder="Friend Mobile">

<button onclick="refer()"

class="bg-blue-500 text-white px-5 rounded-xl font-bold">

Add

</button>

</div>

</div>



<!-- CLAIM -->

<div class="bg-white p-6 rounded-2xl shadow-xl">

<h2 class="font-bold mb-3">

Enter Secret Code

</h2>

<div class="flex gap-2">

<input id="code"

class="flex-1 border p-3 rounded-xl"

placeholder="Enter Code">

<button onclick="claim()"

class="bg-orange-500 text-white px-5 rounded-xl font-bold">

Claim

</button>

</div>

</div>



<!-- LEADERBOARD -->

<div class="bg-white p-6 rounded-2xl shadow-xl">

<h2 class="font-bold mb-4">

🏆 Top Foodies

</h2>

<div id="leaderboard"

class="space-y-2"></div>

</div>



<!-- ORDER -->

<a href="https://clean-scripts.github.io/Easygo-Menu/"

class="block text-center bg-red-600 text-white p-4 rounded-xl font-bold">

Order Now

</a>

</div>

</div>



<script>

const API_URL="https://script.google.com/macros/s/AKfycbyldefvCSAHT7h1abihhwQUHAaIpJrk8K_9uOR93qGhfdeiXbJAcKXSK9hiDKdo-ykQzw/exec"

let mobile=null



async function api(data){

const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
})

return await res.json()

}



window.onload=()=>{

const saved=localStorage.getItem("easygo_user")

if(saved){

mobile=saved
startApp()

}else{

loader.style.display="none"

}

}



function login(){

mobile=document.getElementById("mobile").value

if(mobile.length!=10){

Swal.fire("Invalid number")

return

}

localStorage.setItem("easygo_user",mobile)

startApp()

}



function startApp(){

document.getElementById("login").classList.add("hidden")

Promise.all([

loadWallet(),
loadLeaderboard()

]).then(()=>{

loader.style.display="none"

document.getElementById("app").classList.remove("hidden")

})

}



async function loadWallet(){

const res=await api({
action:"wallet",
mobile:mobile
})

animateCoins(res.coins)

updateTier(res.coins)

}



function updateTier(c){

let tier="Bronze"

if(c>300) tier="Silver"

if(c>1000) tier="Gold"

document.getElementById("tier").innerText="👑 "+tier

}



async function loadLeaderboard(){

const res=await api({
action:"leaderboard"
})

const board=document.getElementById("leaderboard")

board.innerHTML=""

res.forEach((u,i)=>{

let medal=""

if(i==0) medal="🥇"

if(i==1) medal="🥈"

if(i==2) medal="🥉"



const div=document.createElement("div")

div.className="flex justify-between bg-orange-50 p-3 rounded-xl"



div.innerHTML=`
<span>${medal} XX${String(u[0]).slice(-4)}</span>
<span>${u[1]} coins</span>
`

board.appendChild(div)

})

}



async function claim(){

const code=document.getElementById("code").value

Swal.fire({

title:"Checking code...",

didOpen:()=>{

Swal.showLoading()

}

})

const res=await api({
action:"claim",
mobile:mobile,
code:code
})

if(res.error){

Swal.fire("Error",res.error,"error")

return

}

confetti({particleCount:150,spread:70})

Swal.fire("Success","You earned "+res.coins+" coins!","success")

loadWallet()

}



async function refer(){

const friend=document.getElementById("refMobile").value

const res=await api({

action:"refer",

mobile:mobile,

friend:friend

})

if(res.success){

Swal.fire("Pending","Waiting for friend to join")

}else{

Swal.fire(res.error)

}

}



function spin(){

const rewards=[5,10,15,20]

const win=rewards[Math.floor(Math.random()*rewards.length)]

confetti()

Swal.fire(

"🎰 You won "+win+" coins!"

)

}



function mystery(){

const rewards=[10,25,50]

const win=rewards[Math.floor(Math.random()*rewards.length)]

confetti()

Swal.fire(

"🎁 Mystery reward: "+win+" coins!"

)

}



function animateCoins(target){

const el=document.getElementById("coins")

let current=0

const interval=setInterval(()=>{

current+=3

if(current>=target){

current=target

clearInterval(interval)

}

el.innerText=current

},20)

}

</script>

</body>

</html>
