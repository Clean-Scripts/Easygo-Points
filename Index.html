<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EasyGo VIP</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="icon" href="EasyGo-Logo.png">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body class="bg-orange-50 min-h-screen flex items-center justify-center">

<!-- LOADER -->

<div id="loader" class="fixed inset-0 bg-black flex items-center justify-center z-50">

<div class="text-center text-white">

<img src="EasyGo-Logo.png" class="h-24 mx-auto animate-bounce">

<p class="mt-5 text-lg animate-pulse">
Checking your VIP rewards...
</p>

</div>

</div>


<div class="max-w-md w-full p-5">

<!-- LOGIN -->

<div id="login" class="bg-white p-6 rounded-2xl shadow-xl">

<div class="text-center mb-6">

<img src="EasyGo-Logo.png" class="h-16 mx-auto">

<h1 class="text-2xl font-bold mt-3">
EasyGo VIP
</h1>

</div>

<input id="mobile"
placeholder="Enter Mobile Number"
class="w-full border p-3 rounded-xl">

<button onclick="login()"
class="mt-4 w-full bg-orange-500 text-white p-3 rounded-xl font-bold">

Login

</button>

</div>


<!-- APP -->

<div id="app" class="hidden space-y-6">

<!-- WALLET -->

<div class="bg-white p-6 rounded-2xl shadow-xl text-center">

<h2 class="text-xl font-bold">
Wallet
</h2>

<div id="coins"
class="text-5xl text-orange-500 mt-3 font-bold">

0

</div>

<p class="text-gray-500">
Coins
</p>

</div>


<!-- CLAIM CODE -->

<div class="bg-white p-6 rounded-2xl shadow-xl">

<h2 class="font-bold mb-3">

Enter Secret Code

</h2>

<div class="flex gap-2">

<input id="code"
class="flex-1 border p-3 rounded-xl"
placeholder="Enter Code">

<button onclick="claim()"
class="bg-orange-500 text-white px-5 rounded-xl font-bold">

Claim

</button>

</div>

</div>


<!-- LEADERBOARD -->

<div class="bg-white p-6 rounded-2xl shadow-xl">

<h2 class="font-bold mb-4">

Top Foodies

</h2>

<div id="leaderboard" class="space-y-2">

</div>

</div>


<!-- ORDER -->

<a href="https://clean-scripts.github.io/Easygo-Menu/"
class="block text-center bg-red-600 text-white p-4 rounded-xl font-bold">

Place Order Now

</a>

</div>

</div>



<script>

const API_URL="https://script.google.com/macros/s/AKfycbzLcPIGwU4FqAkA3sGNCxFrcn9M8KmcPZ5aNEH01oWVCVdQy8DNY6SyszxqACdkVc0_/exec"

let mobile=null



async function api(data){

const res=await fetch(API_URL,{

method:"POST",
body:JSON.stringify(data)

})

return await res.json()

}



function maskMobile(m){

m=String(m)

return "XX"+m.slice(-4)

}



async function login(){

mobile=document.getElementById("mobile").value

if(mobile.length!=10){

alert("Enter valid mobile")

return

}

document.getElementById("login").classList.add("hidden")

document.getElementById("loader").style.display="flex"

Promise.all([

loadWallet(),

loadLeaderboard()

]).then(()=>{

document.getElementById("loader").style.display="none"

document.getElementById("app").classList.remove("hidden")

})

}



async function loadWallet(){

const res=await api({

action:"wallet",
mobile:mobile

})

animateCoins(res.coins)

}



async function loadLeaderboard(){

const res=await api({

action:"leaderboard"

})

const board=document.getElementById("leaderboard")

board.innerHTML=""

res.forEach((u,i)=>{

const div=document.createElement("div")

div.className="flex justify-between bg-orange-50 p-3 rounded-xl"

div.innerHTML=`

<span class="font-bold">

${maskMobile(u[0])}

</span>

<span>

${u[1]} Coins

</span>

`

board.appendChild(div)

})

}



async function claim(){

const code=document.getElementById("code").value

const res=await api({

action:"claim",
mobile:mobile,
code:code

})

if(res.error){

alert(res.error)

return

}

confetti({

particleCount:150,
spread:70,
origin:{y:0.6}

})

loadWallet()

}



function animateCoins(target){

const el=document.getElementById("coins")

let current=0

const interval=setInterval(()=>{

current+=3

if(current>=target){

current=target
clearInterval(interval)

}

el.innerText=current

},20)

}

</script>

</body>
</html>
